<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
        <rect width="200" height="200" fill="#f0f7f4"/>
        <!-- 面膜袋 -->
        <rect x="50" y="30" width="100" height="140" rx="10" fill="#2d6a4f" stroke="#1b4332" stroke-width="3"/>
        <rect x="60" y="40" width="80" height="120" rx="6" fill="#ffffff" opacity="0.9"/>
        <!-- 點滴針筒 -->
        <rect x="92" y="55" width="16" height="40" rx="2" fill="#52b788"/>
        <line x1="100" y1="95" x2="100" y2="120" stroke="#52b788" stroke-width="4"/>
        <circle cx="100" cy="125" r="8" fill="#52b788"/>
        <!-- 文字與裝飾 -->
        <rect x="75" y="145" width="50" height="8" rx="2" fill="#2d6a4f"/>
        <text x="100" y="112" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">MEDIHEAL</text>
    </svg>