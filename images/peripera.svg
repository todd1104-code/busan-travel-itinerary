<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
        <rect width="200" height="200" fill="#fff5f5"/>
        <!-- 玻璃水光唇釉小瓶子 -->
        <rect x="70" y="65" width="60" height="95" rx="15" fill="#fcd5ce" stroke="#fec5bb" stroke-width="3"/>
        <!-- 內部透光唇釉顏色 -->
        <rect x="76" y="85" width="48" height="63" rx="8" fill="#d90429" opacity="0.75"/>
        <!-- 白色圓形蓋子 -->
        <rect x="80" y="30" width="40" height="40" rx="8" fill="#ffffff" stroke="#fec5bb" stroke-width="2"/>
        <!-- 水滴亮光 -->
        <circle cx="110" cy="100" r="4" fill="#ffffff"/>
        <text x="100" y="132" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">peripera</text>
    </svg>