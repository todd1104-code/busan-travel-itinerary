        <rect x="92" y="30" width="16" height="20" rx="2" fill="#4a3b32"/>
        <!-- 葉子與水滴 -->
        <circle cx="100" cy="110" r="12" fill="none" stroke="#c0a080" stroke-width="1.5"/>
        <circle cx="100" cy="110" r="4" fill="#c0a080"/>
        <text x="100" y="145" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" fill="#4a3b32" text-anchor="middle">YUNJAC</text>
