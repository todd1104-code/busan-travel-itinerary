        <rect x="70" y="70" width="60" height="90" rx="12" fill="#ffffff" stroke="#c0a080" stroke-width="3" opacity="0.9"/>
        <!-- 精華液漸層黃色 -->
        <rect x="76" y="85" width="48" height="65" rx="6" fill="#fceade" opacity="0.8"/>
